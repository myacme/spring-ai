server:
  port: 8082

spring:
  application:
    name: weather-agent
  ai:
    openai:
      api-key: ${ZHIPUAI_API_KEY}
      base-url: https://open.bigmodel.cn/api/paas/v4/
      chat:
        completions-path: /chat/completions    # 覆盖默认的 /v1/chat/completions
        options:
          model: glm-4.7-flash
          temperature: 0.7
          max-tokens: 4096
          top-p: 0.9

logging:
  level:
    com.ljx.weather: DEBUG
    org.springframework.ai: DEBUG
    org.springframework.ai.chat.client: TRACE
    org.springframework.ai.tool: TRACE